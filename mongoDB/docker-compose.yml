
  services:  
    mongodb:
      image: mongo:latest
      container_name: mongodb-container
      restart: always
      ports:
        - "27017:27017"
      environment:
        MONGO_INITDB_ROOT_USERNAME: admin
        MONGO_INITDB_ROOT_PASSWORD: admin
        MONGO_INITDB_DATABASE: mydatabase
      volumes:
        - ./db:/data/db