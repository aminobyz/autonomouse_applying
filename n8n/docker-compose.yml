# docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine          # Lightweight PostgreSQL image[citation:3]
    container_name: n8n-postgres
    restart: always
    environment:
      - POSTGRES_USER=n8n              # Database username[citation:3]
      - POSTGRES_PASSWORD=admin  # **CHANGE THIS PASSWORD**[citation:3]
      - POSTGRES_DB=n8n                # Name of the database for n8n[citation:3]
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists PostgreSQL data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"] # Checks if DB is ready before n8n starts[citation:7]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # n8n Basic Config
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - TZ=Europe/Madrid
      
      # Database Configuration (Connects to the postgres service)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres    # Uses the service name as the hostname[citation:7]
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=admin # **MUST MATCH the password above**[citation:7]
      
      # Security (Generate these with `openssl rand -hex 32`)
      # - N8N_ENCRYPTION_KEY=your-32-byte-hex-key  # Encrypts credential data in DB[citation:4]
      # - N8N_USER_MANAGEMENT_JWT_SECRET=your-32-byte-hex-key # For user session security[citation:4]
      
      # Optional: Basic Authentication
      # - N8N_BASIC_AUTH_ACTIVE=true
      # - N8N_BASIC_AUTH_USER=your-username-here
      # - N8N_BASIC_AUTH_PASSWORD=your-secure-password-here
    volumes:
      - n8n_data:/home/node/.n8n      # Still useful for some local n8n files
    depends_on:
      postgres:
        condition: service_healthy     # Ensures n8n only starts once Postgres is ready[citation:7]

 
volumes:
  n8n_data:
  postgres_data:
  
  